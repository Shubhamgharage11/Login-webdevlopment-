<!DOCTYPE html>
<html>
<head>
<title>Login Form</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
}
.login-box{
    width:300px;
    background:white;
    margin:100px auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}
h2{
    text-align:center;
    margin-bottom:20px;
    color:#2563eb;
}
label{
    font-size:18px;
}
input{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}
button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}
button:hover{
    background:#1d4ed8;
}
p{
    text-align:center;
    margin-top:15px;
}
</style>
</head>
<body>
<div class="login-box">
<h2>User Login</h2>
<form>
<label>Username</label>
<input type="text" placeholder="Enter Username" required>
<label>Password</label>
<input type="password" placeholder="Enter Password" required>
<button type="submit">Login</button>
<p>Forgot Password?</p>
</form>
</div>
</body>
</html>
